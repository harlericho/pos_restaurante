<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pos Restaurante | Iniciar sesión</title>

    <!-- Google Font: Source Sans Pro -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback"
    />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="../plugins/fontawesome-free/css/all.min.css" />
    <!-- icheck bootstrap -->
    <link
      rel="stylesheet"
      href="../plugins/icheck-bootstrap/icheck-bootstrap.min.css"
    />
    <!-- Theme style -->
    <link rel="stylesheet" href="../dist/css/adminlte.min.css" />
    <!-- Favicon icono -->
    <link rel="icon" href="../dist/img/favicon.ico" type="image/png" />
    <link rel="stylesheet" href="../dist/css/custom.css" />
  </head>
  <body class="hold-transition login-page">
    <div class="login-box">
      <!-- /.login-logo -->
      <div class="card card-outline card-primary">
        <div class="card-header text-center">
          <img
            src="../dist/img/AdminLTELogo.png"
            alt="Logo"
            class="mb-2"
            style="width: 180px"
          />
          <h1 class="h1"><b>Soluciones</b>ITEC</h1>
          <p class="login-box-msg">Sistema de Pos Restaurante</p>
        </div>
        <div class="card-body">
          <p class="login-box-msg">Inicia sesión para comenzar tu sesión</p>

          <form id="form-login">
            <div class="input-group mb-3">
              <input
                id="usuario"
                type="text"
                class="form-control"
                placeholder="Usuario"
                autofocus
                autocomplete="username"
              />
              <div class="input-group-append">
                <div class="input-group-text">
                  <span class="fas fa-user"></span>
                </div>
              </div>
            </div>
            <div class="input-group mb-3">
              <input
                id="password"
                type="password"
                class="form-control"
                placeholder="Contraseña"
                autocomplete="current-password"
              />
              <div class="input-group-append">
                <div
                  class="input-group-text"
                  id="btn-toggle-pass"
                  title="Mostrar/ocultar contraseña"
                  style="cursor: pointer"
                >
                  <i class="fas fa-eye" id="icon-toggle-pass"></i>
                </div>
              </div>
            </div>
            <div
              id="error-msg"
              class="alert alert-danger d-none mb-3"
              role="alert"
            ></div>
            <div class="row">
              <!-- /.col -->
              <div class="col-8">
                <button
                  id="btn-login"
                  type="submit"
                  class="btn btn-primary btn-block"
                >
                  Iniciar sesión
                </button>
              </div>
              <!-- /.col -->
            </div>
          </form>
          <!-- Footer -->
          <div class="text-center mt-3" style="font-size: 0.82rem">
            <p class="mb-0 text-muted">
              &copy; <span id="login-footer-year"></span>
              <a
                href="https://solucionesitec.com/"
                target="_blank"
                rel="noopener"
                class="text-muted"
                style="text-decoration: none; font-weight: 600"
                >SolucionesITEC</a
              >
            </p>
            <p class="mb-0 text-muted">
              Sistema de Gestión Comercial
              <span id="login-footer-version">v1.0</span>
              &nbsp;|&nbsp; Todos los derechos reservados
            </p>
          </div>
          <!-- /.social-auth-links -->
        </div>
        <!-- /.card-body -->
      </div>
      <!-- /.card -->
    </div>
    <!-- /.login-box -->

    <!-- jQuery -->
    <script src="../plugins/jquery/jquery.min.js"></script>
    <!-- Bootstrap 4 -->
    <script src="../plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
    <!-- AdminLTE App -->
    <script src="../dist/js/adminlte.min.js"></script>
    <!-- POS Scripts -->
    <script src="../utils/api.js"></script>
    <script src="../utils/login.js"></script>
    <script>
      document
        .getElementById("btn-toggle-pass")
        .addEventListener("click", function () {
          var input = document.getElementById("password");
          var icon = document.getElementById("icon-toggle-pass");
          if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
          } else {
            input.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
          }
          input.focus();
        });
    </script>
  </body>
</html>
